services:
  chromadb:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      - chromadb
      - ollama
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./data:/app/data
      - ./models:/app/models

volumes:
  ollama_data:
